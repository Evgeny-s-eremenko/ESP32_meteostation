<!DOCTYPE html>
<html>
<meta charset='UTF-8'>
<head>
    <title>ESP32 Dashboard</title>
    <style>
        body {
            font-family: sans-serif; /* Шрифт по умолчанию */
            color: #242749;
            background-color: #414f8a; /* Светло-серый фон */
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Два столбца */
            grid-gap: 20px; /* Расстояние между виджетами */
            max-width: 800px; /* Максимальная ширина контейнера */
        }

        .widget {
            background-color: #242749; /* Белый фон виджета */
            color: #101120;
            border-radius: 10px; /* Скругленные углы */
            padding: 20px;
            box-shadow: 0 2px 3px 1px rgba(0, 0, 0, 0.185); /* Тень */
            text-align: center; /* Текст по центру */
        }

            .widget h2 {
                margin-top: 0; /* Убираем верхний отступ у заголовка */
            }

        .value {
            font-size: 24px; /* Размер значения */
            font-weight: bold; /* Жирное начертание */
            margin-top: 10px; /* Отступ сверху */
        }

        .label {
            color: #88888893; /* Серый цвет подписи */
            margin-bottom: 10px; /* Отступ снизу */
        }
        #toggleGraphButton {
        grid-column: span 2; /* Занимает два столбца */
        cursor: pointer; /* Указываем, что это кнопка */
        border: none; /* Убираем рамку */
        padding: 10px 20px; /* Уменьшаем внутренние отступы */
        }

        #chartContainer {
        grid-column: span 2; /* Занимает два столбца */
        margin-top: 20px; /* Отступ сверху */
        }
        iframe {
            background-color: #242749; /* Белый фон виджета */
            color: #101120;
            border-radius: 10px; /* Скругленные углы */
            padding: 20px;
            box-shadow: 0 2px 3px 1px rgba(0, 0, 0, 0.185); /* Тень */
        }
    </style>
</head>
<body>
    <h1>Погодная станция</h1>
    <div class="container">
        <div class="widget">
            <h2>Температура</h2>
            <div class="value" id="temperature"></div>
            <div class="label">Текущая температура</div>
        </div>
        <div class="widget">
            <h2>Влажность</h2>
            <div class="value" id="humidity"></div>
            <div class="label">Относительная влажность</div>
        </div>
        <div class="widget">
            <h2>Точка росы</h2>
            <div class="value" id="dewPoint"></div>
            <div class="label">Температура точки росы</div>
        </div>
        <div class="widget">
            <h2>Давление</h2>
            <div class="value" id="pressure"></div>
            <div class="label">Атмосферное давление</div>
        </div>
    <button id="toggleGraphButton" class="widget">Показать/скрыть график</button>
        <div id="chartContainer" style="display: none;">
            <div class="grid-container">
                <div class="grid-item">
                    <iframe id="temperatureChart" src="http://62.33.134.164:3000/public-dashboards/8540a49c692f4ba7841a2228b102d203" alt="Graph" width="500" height="900" frameborder="0"></iframe>
                </div>
            </div>
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
