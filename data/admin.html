<!DOCTYPE html>
<html lang="ru">
<meta charset="UTF-8">
<head>
    <title>ESP32 Admin</title>
    <style>
        body {
            font-family: sans-serif;
            color: #c7c7c7;
            background-color: #414f8a;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        /* ── Форма настройки nRF905 ─────────────────────────── */
        #setform {
            background: #242749;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            max-width: 400px;
            margin: auto;
        }

        label { display: block; margin-top: 10px; }

        input[type="number"], select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        /* ── Системные виджеты ──────────────────────────────── */
        .container {
            display: grid;
            grid-auto-flow: column;
            grid-gap: 20px;
            max-width: 800px;
            margin-bottom: 20px;
            justify-items: center;
        }

        .widget {
            width: 220px;
            height: 124px;
            font-size: 12px;
            background-color: #242749;
            color: #c7c7c7;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 3px 1px rgba(0, 0, 0, 0.185);
            text-align: center;
        }

        .widget h2 { margin-top: 0; }

        .value {
            font-size: 10px;
            color: #c7c7c7;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        /* ── Кнопки-тумблеры задач ──────────────────────────── */
        .switches-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 20px;
            max-width: 800px;
        }

        .toggle-button {
            width: 150px;
            height: 50px;
            margin: 5px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 2px 3px 1px rgba(0, 0, 0, 0.185);
            transition: background-color 0.3s ease;
            color: #c7c7c7;
        }

        .running { background-color: green; }
        .stopped { background-color: red; }

        /* ── Блок кнопок управления ─────────────────────────── */
        .buttons-block {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-width: 800px;
            margin-top: 20px;
            padding: 20px;
            background-color: #242749;
            border-radius: 10px;
            box-shadow: 0 2px 3px 1px rgba(0, 0, 0, 0.185);
        }

        .block-label {
            width: 100%;
            text-align: center;
            font-size: 13px;
            color: #979797e5;
            margin-bottom: 4px;
            border-bottom: 1px solid #414f8a;
            padding-bottom: 6px;
        }

        .action-button {
            border: none;
            outline: none;
            background-color: #414f8a;
            color: #c7c7c7;
            padding: 0;
            font-size: 12px;
            height: 50px;
            width: 110px;
            cursor: pointer;
            border-radius: 6px;
            transition: background-color 0.3s ease;
        }

        .action-button:hover { background-color: #575eac; }

        /* Деструктивные действия — чуть другой акцент при наведении */
        .action-button.danger:hover { background-color: #7a3030; }

        /* ── Кнопка сохранения настроек nRF905 ─────────────── */
        #Setbutton {
            margin-top: 20px;
            padding: 10px;
            width: 100%;
            border: none;
            background: #414f8a;
            color: #c7c7c7;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        #Setbutton:hover { background: #575eac; }
    </style>
</head>
<body>
    <h1>Настройки и системная информация</h1>

    <!-- Системные виджеты -->
    <div class="container">
        <div class="widget">
            <h2>System Info</h2>
            <div class="value" id="systemInfo"></div>
        </div>
        <div class="widget">
            <h2>I2C Devices</h2>
            <div class="value" id="bmeStatus"></div>
        </div>
        <div class="widget">
            <h2>nRF905 Status</h2>
            <div class="value" id="nrf905Status"></div>
        </div>
    </div>

    <!-- Таск-менеджер -->
    <h2>Управление задачами</h2>
    <div class="switches-container">
        <button id="btnTaskNRF905"     class="toggle-button stopped">nRF905 Stopped</button>
        <button id="btnTaskCO2"        class="toggle-button stopped">CO2 Stopped</button>
        <button id="btnTaskNextion"    class="toggle-button stopped">Nextion Stopped</button>
        <button id="btnTaskBMP280"     class="toggle-button stopped">BMP280 Stopped</button>
        <button id="btnTaskInfluxDB"   class="toggle-button stopped">InfluxDB Stopped</button>
        <button id="btnTaskForecaster" class="toggle-button stopped">Forecast Stopped</button>
        <button id="btnTaskNTP"        class="toggle-button stopped">NTP Stopped</button>
        <button id="btnTaskTVOC"       class="toggle-button stopped">TVOC Stopped</button>
    </div>

    <!-- Единый блок управления: ESP32 + внешний блок STM32 -->
    <h2>Управление</h2>
    <div class="buttons-block">

        <!-- ESP32 -->
        <div class="block-label">ESP32</div>
        <form action="/" method="POST">
            <button type="submit" class="action-button">Home</button>
        </form>
        <form id="form-restart" action="/restart" method="POST">
            <button type="submit" id="RestartButton" class="action-button danger">Restart ESP32</button>
        </form>
        <form id="form-update" action="/updateform" method="POST">
            <button type="submit" class="action-button">Update FW</button>
        </form>
        <form id="form-nrfreset">
            <button type="button" class="action-button" onclick="resetNRF()">Reset nRF905</button>
        </form>

        <!-- Внешний блок STM32 -->
        <div class="block-label">Внешний блок (STM32)</div>
        <button type="button" class="action-button"
                onclick="sendExtCmd('HEATER')"
                title="Принудительный запуск цикла просушки датчика SHT31">
            Просушка
        </button>
        <button type="button" class="action-button"
                onclick="sendExtCmd('NRF_REST')"
                title="Сброс и переинициализация nRF905 на уличном блоке">
            Reset nRF STM32
        </button>
        <button type="button" class="action-button danger"
                onclick="sendExtCmd('REST')"
                title="Полный перезапуск STM32 — данные прервутся на ~15 сек">
            Restart STM32
        </button>

    </div>

    <p id="result"></p>

    <!-- Настройка nRF905 -->
    <h2>Настройка nRF905</h2>
    <form id="setform">
        <label for="channel">Номер канала:</label>
        <input type="number" id="channel" name="channel" value="175" min="0" max="255" required>

        <label>Диапазон:</label>
        <input type="radio" id="lowband" name="band" value="false" checked>
        <label for="lowband" style="display:inline;">433 МГц</label>
        <input type="radio" id="hiband" name="band" value="true">
        <label for="hiband" style="display:inline;">868 МГц</label>

        <label for="power">Мощность передатчика:</label>
        <select id="power" name="power" required>
            <option value="TransmitPowerm10dBm">−10 dBm</option>
            <option value="TransmitPowerm2dBm"> −2 dBm</option>
            <option value="TransmitPower6dBm">  +6 dBm</option>
            <option value="TransmitPower10dBm" selected>+10 dBm</option>
        </select>

        <button type="button" id="Setbutton" onclick="sendNRFConfig()">Сохранить настройки</button>
    </form>

    <script src="/restart.js"></script>
</body>
</html>
