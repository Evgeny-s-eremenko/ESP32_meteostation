<!DOCTYPE html>
<html>
<meta charset='UTF-8'>
<head>
    <title>ESP32 Admin</title>
    <style>
        body {
            font-family: sans-serif;
            color: #c7c7c7;
            background-color: #414f8a;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
		#setform {
			background: #242749;
			padding: 20px;
			border-radius: 8px;
			box-shadow: 0 2px 5px rgba(0,0,0,0.2);
			max-width: 400px;
			margin: auto;
		}
		label {
			display: block;
			margin-top: 10px;
		}	
		input[type="number"],
		select {
			width: 100%;
			padding: 8px;
			margin-top: 5px;
			box-sizing: border-box;
		}		

        .container {
            display: grid;
            grid-auto-flow: column;
            grid-gap: 20px;
            max-width: 800px;
            margin-bottom: 20px;
            justify-items: center;
        }
        .buttons-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 200px;
            justify-content: center;
            margin-top: 40px;
        }

        .switches-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-gap: 20px;
            max-width: 800px;
        }

        .toggle-button {
            width: 150px;
            height: 50px;
            margin: 5px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 2px 3px 1px rgba(0, 0, 0, 0.185);
            transition: background-color 0.3s ease;
        }
        .running {
            background-color: green;
            color: #c7c7c7;
        }
        .stopped {
            background-color: red;
            color: #c7c7c7;
        }

        .widget-title {
            grid-column: span 1;
            text-align: center;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .widget {
            width: 220px;
            height: 124px;
            font-size: 12px;
            background-color: #242749;
            color: #c7c7c7;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 3px 1px rgba(0, 0, 0, 0.185);
            text-align: center;
            max-height: 250px;
        }
        
        .widget h2 {
            margin-top: 0;
        }

        .value {
            font-size: 10px;
            color: #c7c7c7;
            margin-top: 10px;
            margin-bottom: 10px;            
        }

        #RestartButton {
            border: none;            /* Убираем границу */
            outline: none;           /* Убираем обводку при фокусе */
            background-color: #242749; /* Фоновый цвет, который подходит под стиль остальных виджетов */
            padding: 10px;       /* Отступы для удобства клика */
            font-size: 12px;          /* Размер шрифта */
            height: 50px;          /* Размер шрифта */
            width: 90px;
            cursor: pointer;          /* Курсор-рука при наведении */
            transition: background-color 0.3s ease; /* Плавное изменение цвета при нажатии */
        }

        /* Изменение цвета при нажатии (активном состоянии) */
        #RestartButton:hover {
            background-color: #575eac;  /* Цвет при нажатии */
        }
        #Button {
            border: none;            /* Убираем границу */
            outline: none;           /* Убираем обводку при фокусе */
            background-color: #242749; /* Фоновый цвет, который подходит под стиль остальных виджетов */
            padding: 15px;       /* Отступы для удобства клика */
            font-size: 12px;
            height: 50px;          /* Размер шрифта */
            width: 90px;
            cursor: pointer;          /* Курсор-рука при наведении */
            transition: background-color 0.3s ease; /* Плавное изменение цвета при нажатии */
        }

        /* Изменение цвета при нажатии (активном состоянии) */
        #Button:hover {
            background-color: #575eac;  /* Цвет при нажатии */
        }
		#Setbutton {
			margin-top: 20px;
			padding: 10px;
			width: 100%;
			border: none;
			background: #414f8a;
			color: #c7c7c7;
			font-size: 14px;
			cursor: pointer;
			border-radius: 5px;
			transition: background 0.3s ease;
		}
		#Setbutton:hover {
			background: #575eac;
		}

    </style>
</head>
<body>
    <h1>Настройки и системная информация</h1>
    <div class="container">
        <div class="widget">
            <h2>System Info</h2>
            <div class="value" id="systemInfo"></div>
        </div>
        <div class="widget">
            <h2>I2C Devices</h2>
            <div class="value" id="bmeStatus"></div>
        </div>
        <div class="widget">
            <h2>nRF905 Status</h2>
            <div class="value" id="nrf905Status"></div>
        </div>
    </div>
    <h2>Управление задачами</h2>
    <div class="switches-container">
        <button id="btnTaskGeomagnetic" class="toggle-button stopped">Geomagnetic task Stopped</button>
        <button id="btnTaskNRF905" class="toggle-button stopped">nRF905 task Stopped</button>
        <button id="btnTaskCO2" class="toggle-button stopped">CO2 task Stopped</button>
        <button id="btnTaskNextion" class="toggle-button stopped">Nextion task Stopped</button>
        <button id="btnTaskBMP280" class="toggle-button stopped">BMP280 task Stopped</button>
        <button id="btnTaskInfluxDB" class="toggle-button stopped">InfluxDB task Stopped</button>
        <button id="btnTaskForecaster" class="toggle-button stopped">Forecast task Stopped</button>
        <button id="btnTaskNTP" class="toggle-button stopped">NTP task Stopped</button>
        <button id="btnTaskTVOC" class="toggle-button stopped">TVOC task Stopped</button>
        <button id="btnTaskRTC" class="toggle-button stopped">RTC task Stopped</button>
    </div>
    <div class="buttons-container">
        <form action="/" method="POST">
            <button type="submit" id="Button" class="widget">Home</button>
        </form>
        <form id="restartForm" action="/restart" method="POST">
            <button type="submit" id="RestartButton" class="widget">Restart ESP32</button>
        </form>
        <form id="restartForm" action="/updateform" method="POST">
            <button type="submit" id="Button" class="widget">Update FW</button>
        </form>
        <form id="restartForm" action="/nrfreset" method="POST">
            <button type="button" id="Button" class="widget" onclick="resetNRF()">Reset nRF905</button>
        </form>
    </div>
	<h2>Настройка nRF905</h2>
  <form id="setform">
    <label for="channel">Номер канала:</label>
    <input type="number" id="channel" name="channel" value="175" min="0" max="255" required>

    <label>Диапазон:</label>
    <input type="radio" id="lowband" name="band" value="false" checked>
    <label for="lowband" style="display:inline;">433 МГц</label>
    <input type="radio" id="hiband" name="band" value="true">
    <label for="hiband" style="display:inline;">868 Мгц</label>

    <label for="power">Мощность передатчика:</label>
    <select id="power" name="power" required>
      <!-- Значения соответствуют перечислению TransmitPower -->
      <option value="TransmitPowerm10dBm">-10 dBm</option>
      <option value="TransmitPowerm2dBm">-2 dBm</option>
      <option value="TransmitPower6dBm">6 dBm</option>
      <option value="TransmitPower10dBm" selected>10 dBm</option>
    </select>

    <button type="button" id="Setbutton" onclick="sendNRFConfig()">Сохранить настройки</button>
  </form>

  <p id="result"></p>
        <script src="/restart.js"></script>
</body>
</html>
