<!DOCTYPE html>
<html>
<meta charset='UTF-8'>
<head>
    <title>ESP32 Dashboard</title>
    <style>
        body {
            font-family: sans-serif;
            color: #c7c7c7;
            background-color: #414f8a;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-gap: 20px;
            max-width: 800px;
        }

        .widget-title {
            grid-column: span 1;
            text-align: center;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .widget {
            width: 220px;
            height: 124px;
            background-color: #242749;
            color: #c7c7c7;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 3px 1px rgba(0, 0, 0, 0.185);
            text-align: center;
            transition: background-color 0.3s ease;
        }

        .widget:hover {
            background-color: #575eac;  /* Цвет при нажатии */
        }

        .pressure-widget {
            width: 500px;
            height: 143px;
            grid-column: span 2;
            position: relative;
            background-color: #242749;
            color: #c7c7c7;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 3px 1px rgba(0, 0, 0, 0.185);
            text-align: center;
            transition: background-color 0.3s ease;
        }

        .pressure-widget:hover {
            background-color: #575eac;  /* Цвет при нажатии */
        }

        #weatherIcon {
            position: absolute;
            left: 20px;
            top: 35%;
            transform: translateY(-50%);
            width: 80px;
            height: 80px;
        }

        #trendIcon {
            position: absolute;
            right: 20px;
            top: 35%;
            transform: translateY(-50%);
            width: 80px;
            height: 80px;
        }

        .widget h2 {
            margin-top: 0;
        }

        .value {
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
        }

        .label {
            color: #979797e5;
            margin-bottom: 10px;
        }

        #toggleGraphButton {
            width: 540px;
            height: 35px;
            grid-column: span 2;
            background-color: #242749;
            cursor: pointer;
            border: none;
            padding: 10px 20px;
            transition: background-color 0.3s ease;
        }

        #toggleGraphButton:hover {
            background-color: #575eac;
        }

        #chartContainer {
            grid-column: span 2;
            margin-top: 20px;
        }

        iframe {
            background-color: #242749;
            color: #c7c7c7;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 2px 3px 1px rgba(0, 0, 0, 0.185);
        }

        /* Стили для индикатора */
        .progress-bar {
            width: 100%;
            height: 20px;
            background-color: #979797e5;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: inset 2px 3px 1px 0px rgba(0, 0, 0, 0.185);
            margin-top: 10px;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.3s ease, background-color 0.3s ease; /* Плавное изменение ширины и цвета */
        }

        #Button {
            width: 90px;
            height: 50px;
            border: none;            /* Убираем границу */
            outline: none;           /* Убираем обводку при фокусе */
            background-color: #242749; /* Фоновый цвет, который подходит под стиль остальных виджетов */
            padding: 15px;       /* Отступы для удобства клика */
            font-size: 12px;          /* Размер шрифта */
            text-align: center;
            cursor: pointer;          /* Курсор-рука при наведении */
            transition: background-color 0.3s ease; /* Плавное изменение цвета при нажатии */
        }

        /* Изменение цвета при нажатии (активном состоянии) */
        #Button:hover {
            background-color: #575eac;  /* Цвет при нажатии */
        }
    </style>
</head>
<body>
    <h1>Погодная станция</h1>
    <div class="container">
        <div class="widget-title">Улица</div>
        <div class="widget-title">Дом</div>
        <div class="widget">
            <h2>Температура</h2>
            <div class="value" id="temperature"></div>
            <div class="label">Текущая температура</div>
            <div class="progress-bar">
                <div class="progress-bar-fill" id="temperatureBar"></div>
            </div>
        </div>
        <div class="widget">
            <h2>Температура</h2>
            <div class="value" id="homeTemp"></div>
            <div class="label">Текущая температура</div>
            <div class="progress-bar">
                <div class="progress-bar-fill" id="homeTempBar"></div>
            </div>
        </div>
        <div class="widget">
            <h2>Влажность</h2>
            <div class="value" id="humidity"></div>
            <div class="label">Относительная влажность</div>
            <div class="progress-bar">
                <div class="progress-bar-fill" id="humidityBar"></div>
            </div>
        </div>
        <div class="widget">
            <h2>Влажность</h2>
            <div class="value" id="homeHum"></div>
            <div class="label">Относительная влажность</div>
            <div class="progress-bar">
                <div class="progress-bar-fill" id="homeHumBar"></div>
            </div>
        </div>
        <div class="widget">
            <h2>Точка росы</h2>
            <div class="value" id="dewPoint"></div>
            <div class="label">Температура точки росы</div>
            <div class="progress-bar">
                <div class="progress-bar-fill" id="dewPointBar"></div>
            </div>
        </div>
        <div class="widget">
            <h2>Точка росы</h2>
            <div class="value" id="homeDP"></div>
            <div class="label">Температура точки росы</div>
            <div class="progress-bar">
                <div class="progress-bar-fill" id="homeDPBar"></div>
            </div>
        </div>
        <div class="pressure-widget">
            <img id="weatherIcon" src="/transparent.png" alt="Weather Icon">
            <img id="trendIcon" src="/transparent.png" alt="Trend Icon">
            <h2>Давление</h2>
            <div class="value" id="pressure"></div>
            <div class="label">Атмосферное давление</div>
            <div class="progress-bar">
                <div class="progress-bar-fill" id="pressureBar"></div>
            </div>
        </div>
        <button id="toggleGraphButton" class="widget">Показать/скрыть график</button>
        <div id="chartContainer" style="display: none;">
            <div class="grid-container">
                <div class="grid-item">
                    <iframe id="temperatureChart" src="http://62.33.134.164:3000/public-dashboards/8540a49c692f4ba7841a2228b102d203" alt="Graph" width="520" height="900" frameborder="0"></iframe>
                </div>
            </div>
        </div>
        <form action="/REMOVED" method="POST">
            <button type="submit" id="Button" class="widget">Настройки</button>
        </form>
        <form action="/about" method="POST">
            <button type="submit" id="Button" class="widget">About</button>
        </form>
    </div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="/script.js"></script>
</body>
</html>
